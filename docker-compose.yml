services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cinereserve
      POSTGRES_USER: cinereserve_user
      POSTGRES_PASSWORD: cinereserve_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: